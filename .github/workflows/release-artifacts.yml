name: release-artifacts

on:
  push:
    branches: [pub/tbfix-v6.17, main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:
    inputs:
      publish:
        description: 'When triggered manually against a v* tag, also create or update a GitHub Release.'
        required: false
        default: false
        type: boolean

concurrency:
  group: release-artifacts-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: build deb
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build DKMS deb
        run: |
          mkdir -p dist
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            -e TBFIX_LINT=1 \
            ubuntu:24.04 \
            bash tools/ci/distro-package.sh ubuntu
          ls -la dist/

      - name: Verify DKMS deb install
        run: |
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            ubuntu:24.04 \
            bash tools/ci/distro-install.sh 'dist/thunderbolt-tbfix-dkms_*.deb'

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: thunderbolt-tbfix-deb
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: ${{ startsWith(github.ref, 'refs/tags/v') && (github.event_name == 'push' || inputs.publish) }}
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/* --clobber
          else
            gh release create "$tag" dist/* --title "$tag" --generate-notes
          fi
